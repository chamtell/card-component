<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | Product preview card component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<main class="product-card">
  <figure class="product-card__media"><img src="./images/image-product-desktop.jpg" alt="Product image" class="produc-card_image"></figure>
  <section class="product-card__content">
    <p class="product-card__category">Perfume</p>
    <h1 class="product-card__title">Gabrielle Essence Eau De Parfum</h1>
    <p class="product-card__description">A floral, solar and voluptuous interpretation composed by Olivier Polge, Perfumer-Creator for the House of CHANEL.</p>
    <div class="product-card__price">
      <span class="product-card__price--current">$149.99</span>
      <span class="product-card__price--previous">$169.99</span>
    </div>
  </section>
  <button class="product-card__cta" type="button">
    <img src="./images/icon-cart.svg" alt="card icon" class="icon">
    <span>Add to card</span>
  </button>
</main>
</body>
</html>
